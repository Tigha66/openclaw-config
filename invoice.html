<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Invoice to Client | autoAIwebsolutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --dark: #1e293b; }
        body { background: #f8fafc; }
        .invoice-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .preview-box { background: #f1f5f9; border-radius: 12px; min-height: 200px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="invoice-card p-4 mb-4">
                    <h4><i class="fas fa-file-invoice text-primary"></i> Create Invoice</h4>
                    <hr>
                    <form id="invoiceForm">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Client Name</label>
                                <input type="text" class="form-control" id="clientName" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Client Email</label>
                                <input type="email" class="form-control" id="clientEmail" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Package</label>
                                <select class="form-select" id="package">
                                    <option value="starter">Starter Website - £199</option>
                                    <option value="professional" selected>Professional Website - £349</option>
                                    <option value="ecommerce">E-Commerce Website - £549</option>
                                    <option value="custom">Custom Quote</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Amount (£)</label>
                                <input type="number" class="form-control" id="amount" value="349">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="2" id="description">Professional website development including mobile-responsive design, contact forms, and basic SEO setup.</textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Deposit % (optional)</label>
                                <input type="number" class="form-control" id="deposit" value="50" min="0" max="100">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Due Date</label>
                                <input type="date" class="form-control" id="dueDate">
                            </div>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-envelope"></i> Send Invoice</button>
                        <button type="button" class="btn btn-success" onclick="createStripeLink()"><i class="fab fa-stripe-s"></i> Create Payment Link</button>
                    </form>
                </div>

                <div class="invoice-card p-4">
                    <h5><i class="fas fa-history"></i> Recent Invoices</h5>
                    <table class="table mt-3">
                        <thead><tr><th>Client</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="invoiceList">
                            <tr><td>Dan the Plumber</td><td>£349</td><td><span class="badge bg-warning">Pending</span></td><td><button class="btn btn-sm btn-outline-primary">Resend</button></td></tr>
                            <tr><td>Arrow Dental</td><td>£199</td><td><span class="badge bg-success">Paid</span></td><td><button class="btn btn-sm btn-outline-primary">View</button></td></tr>
                            <tr><td>Strands Salon</td><td>£349</td><td><span class="badge bg-warning">Pending</span></td><td><button class="btn btn-sm btn-outline-primary">Resend</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const packages = {
            starter: { name: 'Starter Website', price: 199 },
            professional: { name: 'Professional Website', price: 349 },
            ecommerce: { name: 'E-Commerce Website', price: 549 }
        };

        document.getElementById('package').addEventListener('change', function() {
            const pkg = packages[this.value];
            if (pkg) document.getElementById('amount').value = pkg.price;
        });

        document.getElementById('invoiceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const client = document.getElementById('clientName').value;
            const email = document.getElementById('clientEmail').value;
            const amount = document.getElementById('amount').value;
            alert(`Invoice sent to ${email}\n\nAmount: £${amount}\n\nStripe payment link would be generated here.`);
        });

        function createStripeLink() {
            const amount = document.getElementById('amount').value;
            const desc = document.getElementById('description').value;
            const client = document.getElementById('clientName').value;
            
            // This would connect to Stripe API in production
            // For demo, we'll show the link that would be created
            const stripeLink = `https://buy.stripe.com/test_${amount}${client.replace(/\s/g,'').toLowerCase()}`;
            
            alert(`Stripe Payment Link Created!\n\nLink: ${stripeLink}\n\nAmount: £${amount}\n\nYou can send this link to your client via email, WhatsApp, or SMS.`);
        }

        // Set default due date to 7 days from now
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + 7);
        document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];
    </script>
</body>
</html>

        .badge-dentist { background: #10b981; }
        .badge-agent { background: #6366f1; }
        .badge-salon { background: #ec4899; }
        .badge-other { background: #3b82f6; }
        .wa-btn { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }

        .site-btn { background: #1f1f1f; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .site-btn:hover { border-color: var(--primary); }
        .search-box { background: #1f1f1f; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 10px; width: 100%; }
        .search-box:focus { border-color: var(--primary); outline: none; }
        .filter-btn { background: #1f1f1f; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s; font-size: 0.85rem; }

I've built a FREE professional website for your business!

    }

    function render(list) {
        document.getElementById('results').innerHTML = list.map(b => {
            const phone = b.phone || '447000000000';
            const waLink = `https://wa.me/${phone}?text=${encodeURIComponent(getMessage(b))}`;
            const siteLink = baseUrl + b.site;
            return `
            <div class="business-card">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <span class="badge ${badgeClass[b.cat]}">${b.cat}</span>
                        <h5 class="mt-2 mb-1">${b.name}</h5>
                        <small class="text-success"><i class="fas fa-phone"></i> ${phone}</small>
                    </div>
                    <div class="col-md-8 text-md-end mt-3 mt-md-0">
                        <a href="${siteLink}" target="_blank" class="site-btn" style="margin-right:8px"><i class="fas fa-eye"></i> View Site</a>
                        <a href="${waLink}" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> Message</a>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('results').innerHTML += `<p class="text-muted mt-3">Total: ${list.length} businesses</p>`;
    }

    let currentFilter = 'all';
    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let list = businesses;
        if (currentFilter !== 'all') list = list.filter(b => b.cat === currentFilter);
        const q = document.getElementById('search').value.toLowerCase();
        if (q) list = list.filter(b => b.name.toLowerCase().includes(q));
        render(list);
    }

    render(businesses);
    document.getElementById('search').addEventListener('input', applyFilters);

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Outreach - autoAIwebsolutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #25D366; --dark: #0d0d0d; --dark-card: #141414; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; }
        .header { background: linear-gradient(135deg, #25D366, #128C7E); padding: 2rem 0; margin-bottom: 2rem; }
        .business-card { background: var(--dark-card); border: 1px solid #1f1f1f; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; transition: all 0.3s; }
        .business-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .badge-plumber { background: #ff6b00; }
        .badge-dentist { background: #10b981; }
        .badge-agent { background: #6366f1; }
        .badge-salon { background: #ec4899; }
        .badge-other { background: #3b82f6; }
        .wa-btn { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
        .wa-btn:hover { background: #128C7E; transform: scale(1.05); }
        .site-btn { background: #1f1f1f; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .site-btn:hover { border-color: var(--primary); }
        .search-box { background: #1f1f1f; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 10px; width: 100%; }
        .search-box:focus { border-color: var(--primary); outline: none; }
        .filter-btn { background: #1f1f1f; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s; font-size: 0.85rem; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1><i class="fab fa-whatsapp"></i> WhatsApp Outreach</h1>
            <p class="mb-0">Click "Message" to send pre-filled WhatsApp message with website link</p>
        </div>
    </div>
    <div class="container">
        <div class="mb-3">
            <button class="filter-btn active" onclick="filter('all')">All</button>
            <button class="filter-btn" onclick="filter('Plumber')">Plumbers</button>
            <button class="filter-btn" onclick="filter('Dentist')">Dentists</button>
            <button class="filter-btn" onclick="filter('Agent')">Agents</button>
            <button class="filter-btn" onclick="filter('Salon')">Salons</button>
            <button class="filter-btn" onclick="filter('Other')">Other</button>
        </div>
        <input type="text" class="search-box mb-4" placeholder="Search businesses..." id="search">
        <div id="results"></div>
    </div>

    <script>
    const baseUrl = "https://tigha66.github.io/openclaw-config/new-sites/";
    const mySite = "https://tigha66.github.io/openclaw-config/";
    const myEmail = "tigha66@gmail.com";
    const myWebsite = "autoAIwebsolutions.com";
    
    const businesses = [
        {name:"Englands Plumber",cat:"Plumber",site:"englands-plumber/",phone:"07405881006"},
        {name:"Tubbs Plumbing",cat:"Plumber",site:"tubbs-plumbing/",phone:"02086959165"},
        {name:"Fast Plumber London",cat:"Plumber",site:"fast-plumber-london/",phone:"02078711956"},
        {name:"National Plumbers",cat:"Plumber",site:"national-plumbers/",phone:"07760244444"},
        {name:"MC Plumber",cat:"Plumber",site:"mc-plumber/",phone:"02079460194"},
        {name:"East London Plumbing",cat:"Plumber",site:"east-london-plumbing/",phone:"02039848457"},
        {name:"Bens Plumbing & Heating",cat:"Plumber",site:"bens-plumbing/",phone:"02086946618"},
    ];

    const badgeClass = {
        "Plumber": "badge-plumber",
        "Dentist": "badge-dentist",
        "Agent": "badge-agent",
        "Salon": "badge-salon",
        "Other": "badge-other"
    };

    function sendWA(phone, name, site) {
        phone = phone.replace(/[^0-9]/g, '');
        if (!phone.startsWith('44')) phone = '44' + phone;
        
        const message = `Hi ${name}!

I've built a FREE professional website for your business!

📺 VIEW SAMPLE: ${baseUrl}${site}

💰 PRICES: From £397 one-time or £39/month

🚀 What's included:
• Mobile-friendly design
• Online booking/contact forms  
• Google Maps listing
• SEO optimization
• Your domain email

Check out more of my work:
🌐 ${mySite}

Interested? Reply to this message!

Cheers,
Abdelhak
📧 ${myEmail}
🌐 ${myWebsite}`;
        
        const waUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
        window.open(waUrl, '_blank');
    }

    function render(list) {
        let html = '';
        for (let b of list) {
            html += `<div class="business-card">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <span class="badge ${badgeClass[b.cat]}">${b.cat}</span>
                        <h5 class="mt-2 mb-1">${b.name}</h5>
                        <small class="text-success"><i class="fab fa-whatsapp"></i> ${b.phone}</small>
                    </div>
                    <div class="col-md-8 text-md-end mt-3 mt-md-0">
                        <a href="${baseUrl}${b.site}" target="_blank" class="site-btn" style="margin-right:8px"><i class="fas fa-eye"></i> View Site</a>
                        <button onclick="sendWA('${b.phone}', '${b.name}', '${b.site}')" class="wa-btn"><i class="fab fa-whatsapp"></i> Message</button>
                    </div>
                </div>
            </div>`;
        }
        html += `<p class="text-muted mt-3">Total: ${list.length} businesses</p>`;
        document.getElementById('results').innerHTML = html;
    }

    let currentFilter = 'all';
    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let list = businesses;
        if (currentFilter !== 'all') list = list.filter(b => b.cat === currentFilter);
        const q = document.getElementById('search').value.toLowerCase();
        if (q) list = list.filter(b => b.name.toLowerCase().includes(q));
        render(list);
    }

    render(businesses);
    document.getElementById('search').addEventListener('input', applyFilters);
    </script>
</body>
</html>

        :root { --primary: #25D366; --dark: #0d0d0d; --dark-card: #141414; }

        .header { background: linear-gradient(135deg, #25D366, #128C7E); padding: 2rem 0; margin-bottom: 2rem; }
        .business-card { background: var(--dark-card); border: 1px solid #1f1f1f; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; transition: all 0.3s; }
        .business-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .badge-plumber { background: #ff6b00; }
        .badge-dentist { background: #10b981; }
        .badge-agent { background: #6366f1; }
        .badge-salon { background: #ec4899; }
        .wa-btn { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
        .wa-btn:hover { background: #128C7E; transform: scale(1.05); }
        .site-btn { background: #1f1f1f; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; color: white; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .site-btn:hover { border-color: var(--primary); }
        .search-box { background: #1f1f1f; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 10px; width: 100%; }
        .search-box:focus { border-color: var(--primary); outline: none; }
        .filter-btn { background: #1f1f1f; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s; font-size: 0.85rem; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }
    </style>
</head>

    const badgeClass = {"Plumber":"badge-plumber","Dentist":"badge-dentist","Agent":"badge-agent","Salon":"badge-salon","Other":"badge-other"};

    function sendWA(phone, name, site) {
        if (!phone) {
            alert("No phone number for this business. Search online to find their contact info first.");
            return;
        }
        phone = phone.replace(/[^0-9]/g, '');
        if (!phone.startsWith('44')) phone = '44' + phone;
        
        let siteUrl = site ? baseUrl + site : mySite;
        
        const message = `Hi ${name}!

I've built a FREE professional website for your business!

📺 VIEW SAMPLE: ${siteUrl}

💰 PRICES: From £397 one-time or £39/month

🚀 What's included:
• Mobile-friendly design
• Online booking/contact forms  
• Google Maps listing
• SEO optimization
• Your domain email

Check out more of my work:
🌐 ${mySite}

Interested? Reply to this message!

Cheers,
Abdelhak
📧 ${myEmail}
🌐 ${myWebsite}`;
        
        const waUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
        window.open(waUrl, '_blank');
    }

    function render(list) {
        let html = '';
        for (let b of list) {
            const hasSite = b.site ? `<a href="${baseUrl}${b.site}" target="_blank" class="site-btn" style="margin-right:8px"><i class="fas fa-eye"></i> View Site</a>` : '';
            const phoneDisplay = b.phone ? `<small class="text-success"><i class="fab fa-whatsapp"></i> ${b.phone}</small>` : `<small class="text-muted">No phone - search online</small>`;
            const msgBtn = b.phone ? `<button onclick="sendWA('${b.phone}', '${b.name}', '${b.site}')" class="wa-btn"><i class="fab fa-whatsapp"></i> Message</button>` : `<button onclick="searchOnline('${b.name}')" class="wa-btn" style="background:#666"><i class="fas fa-search"></i> Find Phone</button>`;
            
            html += `<div class="business-card">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <span class="badge ${badgeClass[b.cat]}">${b.cat}</span>
                        <h5 class="mt-2 mb-1">${b.name}</h5>
                        ${phoneDisplay}
                    </div>
                    <div class="col-md-8 text-md-end mt-3 mt-md-0">
                        ${hasSite}
                        ${msgBtn}
                    </div>
                </div>
            </div>`;
        }
        html += `<p class="text-muted mt-3">Total: ${list.length} businesses</p>`;
        document.getElementById('results').innerHTML = html;
    }

    function searchOnline(name) {
        window.open('https://www.google.com/search?q=' + encodeURIComponent(name + ' phone number'), '_blank');
    }

    let currentFilter = 'all';
    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let list = businesses;
        if (currentFilter !== 'all') list = list.filter(b => b.cat === currentFilter);
        const q = document.getElementById('search').value.toLowerCase();
        if (q) list = list.filter(b => b.name.toLowerCase().includes(q));
        render(list);
    }

    render(businesses);
    document.getElementById('search').addEventListener('input', applyFilters);
    </script>

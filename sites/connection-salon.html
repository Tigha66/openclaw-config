<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Salon | Hair & Beauty in London</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #d63384; --dark: #1a1a2e; --light: #fdf2f8; --white: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        header { background: var(--dark); padding: 1rem 2rem; position: fixed; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--white); }
        .btn-primary { background: var(--primary); color: var(--white); padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; }
        .hero { background: var(--dark); color: var(--white); padding: 8rem 2rem 4rem; text-align: center; }
        .hero h1 { font-size: 3rem; }
        .services { padding: 5rem 2rem; background: var(--light); }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .service-card { background: var(--white); padding: 2rem; border-radius: 12px; text-align: center; }
        .cta-section { background: var(--primary); padding: 5rem 2rem; text-align: center; color: var(--white); }
        footer { background: var(--dark); color: var(--white); padding: 3rem 2rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div style="max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
            <div class="logo">Connection Salon</div>
            <a href="tel:02073730664" class="btn-primary">Book Now</a>
        </div>
    </header>
    <section class="hero">
        <h1>Expert Hair in Earls Court</h1>
        <p>Cuts, colouring, styling.</p>
        <a href="tel:02073730664" class="btn-primary" style="margin-top:1rem;display:inline-block">020 7373 0664</a>
    </section>
    <section class="services">
        <div class="services-grid">
            <div class="service-card"><h3>Cuts</h3></div>
            <div class="service-card"><h3>Colouring</h3></div>
            <div class="service-card"><h3>Styling</h3></div>
            <div class="service-card"><h3>Beauty</h3></div>
        </div>
    </section>
    <section class="cta-section">
        <h2>Book Now</h2>
        <a href="tel:02073730664" class="btn-primary" style="background:var(--white);color:var(--primary)">020 7373 0664</a>
    </section>
    <footer>
        <p>172 Earls Court Rd, London SW5 9QQ</p>
        <p>020 7373 0664</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autoAIwebsolutions - Business Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0a;
            --surface: #111111;
            --surface-elevated: #1a1a1a;
            --accent: #ff6b00;
            --accent-light: #ff8c33;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            padding: 3rem 0;
            margin-bottom: 3rem;
        }
        
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .stats-card {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stats-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .stats-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stats-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .filter-btn {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            padding: 0.5rem 1.25rem;
            border-radius: 25px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .business-card {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
            height: 100%;
        }
        
        .business-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .business-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .badge-plumber { background: rgba(255, 107, 0, 0.2); color: #ff6b00; }
        .badge-dentist { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-agent { background: rgba(99, 102, 241, 0.2); color: #6366f1; }
        .badge-salon { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        
        .business-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        
        .business-address {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        
        .business-phone {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .view-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .view-btn:hover {
            background: var(--accent-light);
            color: white;
            transform: scale(1.05);
        }
        
        .search-box {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            width: 100%;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        footer {
            background: var(--surface);
            padding: 2rem 0;
            margin-top: 4rem;
            border-top: 1px solid var(--border);
        }
        
        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

            <button class="filter-btn" onclick="filter('Dentist')">Dentists</button>

        <!-- Search -->

        <!-- Businesses Grid -->

            <!-- Populated by JavaScript -->

    </div>
    
    <footer>

    const badgeClass = {Plumber:"badge-plumber",Dentist:"badge-dentist",Agent:"badge-agent",Salon:"badge-salon"};

    function render(list) {
        document.getElementById('results').innerHTML = list.map(b => `
            <div class="col-md-6 col-lg-4">
                <div class="business-card">
                    <span class="business-badge badge-${b.cat.toLowerCase()}">${b.cat}</span>
                    <div class="business-name">${b.name}</div>
                    <div class="business-address"><i class="fas fa-map-marker-alt"></i> ${b.addr}</div>
                    <div class="business-phone"><i class="fas fa-phone"></i> ${b.phone}</div>
                    <a href="${baseUrl}${b.site}" target="_blank" class="view-btn">
                        <i class="fas fa-external-link-alt"></i> View Website
                    </a>
                </div>
            </div>
        `).join('');
    }

    let currentFilter = 'all';
    
    function filter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let list = businesses;
        if (currentFilter !== 'all') {
            list = list.filter(b => b.cat === currentFilter);
        }
        const q = document.getElementById('search').value.toLowerCase();
        if (q) {
            list = list.filter(b => b.name.toLowerCase().includes(q) || b.cat.toLowerCase().includes(q));
        }
        render(list);
    }

    render(businesses);
    document.getElementById('search').addEventListener('input', applyFilters);
    </script>
</body>
</html>
